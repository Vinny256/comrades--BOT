<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMRADES-MD | Modern Interface</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/matrix/50/ff9100/matrix-desktop.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <style>
        :root { 
            --accent: #ff9100; 
            --accent-glow: rgba(255, 145, 0, 0.4);
            --bg-dark: #08080a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            margin: 0; 
            background: var(--bg-dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* Animated Background Circles */
        .bg-visuals {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(80px);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            animation: move 25s infinite alternate;
        }

        .b1 { width: 500px; height: 500px; background: #ff5e00; top: -10%; left: -10%; }
        .b2 { width: 400px; height: 400px; background: #ff9100; bottom: -10%; right: -5%; animation-delay: -5s; }
        .b3 { width: 300px; height: 300px; background: #ff0055; top: 40%; left: 30%; animation-delay: -10s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(150px, 100px) scale(1.2); }
        }

        /* Layout */
        .wrapper { position: relative; z-index: 10; width: 100%; }
        .view { display: none; min-height: 100vh; padding: 60px 5%; }
        .view.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Typography */
        .logo-text { 
            font-family: 'Poppins'; 
            font-size: clamp(2.5rem, 8vw, 4rem);
            background: linear-gradient(to right, #ff9100, #ff5e00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            letter-spacing: -1px;
            margin: 0;
        }

        /* Glass Cards */
        .card { 
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
        }
        .card:hover { 
            border-color: var(--accent); 
            background: rgba(255, 145, 0, 0.05); 
            transform: translateY(-8px); 
        }
        .card i { font-size: 2rem; color: var(--accent); margin-bottom: 15px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            width: 100%; 
            max-width: 1000px; 
            margin-top: 40px; 
        }

        /* Form Components */
        .terminal {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .iti { width: 100%; margin-bottom: 25px; }
        input[type="tel"], #gh-input {
            width: 100% !important; 
            background: rgba(255,255,255,0.05) !important; 
            border: 1px solid var(--glass-border) !important;
            color: #fff !important; 
            padding: 15px 15px 15px 85px !important; 
            border-radius: 15px;
            font-family: 'Inter';
        }
        #gh-input { padding: 15px !important; text-align: center; margin: 20px 0; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn { 
            padding: 16px; 
            border-radius: 15px; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            font-family: 'Inter';
            font-size: 0.9rem;
        }
        .btn-fill { background: var(--accent); color: #000; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        /* Loader */
        #loader-bar { display: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin: 20px 0; }
        #loader-bar::after { content: ""; display: block; width: 40%; height: 100%; background: var(--accent); animation: slide 1.5s infinite; }
        @keyframes slide { from { margin-left: -40%; } to { margin-left: 100%; } }

        /* Session/Display Boxes */
        .stagnant-box, .session-id-box { 
            display: none; 
            width: 100%; 
            margin-top: 25px; 
            background: rgba(0,0,0,0.2); 
            border-radius: 15px; 
            padding: 20px; 
        }
        #pair-val { font-size: 2.5rem; font-weight: 700; color: var(--accent); letter-spacing: 5px; }

        /* Responsive Fixes */
        @media (max-width: 600px) {
            .view { padding: 40px 20px; }
            .terminal { padding: 25px; }
            .grid { grid-template-columns: 1fr 1fr; }
            .logo-text { font-size: 2.2rem; }
        }

        /* Modal */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 5000; }
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #111; border: 1px solid var(--accent); border-radius: 25px; padding: 40px; width: 90%; max-width: 400px; z-index: 5001; 
        }

        .music-ctrl { position: fixed; bottom: 20px; right: 20px; background: var(--glass); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 50px; font-size: 0.7rem; color: #888; cursor: pointer; backdrop-filter: blur(10px); }
        footer { margin-top: 50px; opacity: 0.4; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

    <div class="bg-visuals">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <audio id="bg-audio" loop src="https://raw.githubusercontent.com/Vinny256/COMRADES-MD/main/assets/play.mp3"></audio>
    <div class="music-ctrl" onclick="toggleMusic()" id="m-btn">AUDIO: OFF</div>

    <div class="overlay" id="overlay"></div>
    <div class="modal" id="fork-modal">
        <div class="logo-text" style="font-size: 1.5rem;">FORK_GUARD</div>
        <input type="text" id="gh-input" placeholder="GITHUB_USER">
        <button class="btn btn-fill" style="width:100%;" onclick="runForkVerify()">VERIFY_REPO</button>
        <p onclick="closeGuard()" style="text-align:center; font-size: 0.6rem; margin-top: 20px; cursor: pointer; color: #666;">[ BYPASS ]</p>
    </div>

    <div class="wrapper">
        <section id="home-view" class="view active">
            <div class="logo-text">COMRADES-MD</div>
            <p style="text-align:center; color: #888; margin-top: 10px;">V_3.0 NEURAL INTERFACE</p>
            
            <div style="margin: 40px 0;">
                <button class="btn btn-fill" style="padding: 18px 60px;" onclick="navTo('term-view')">START SESSION</button>
            </div>

            <div class="grid">
                <div class="card" onclick="window.open('https://github.com/Vinny256/COMRADES-MD')">
                    <i class="fas fa-code-branch"></i><h3>SOURCE</h3>
                </div>
                <div class="card" onclick="openGuard('https://dashboard.heroku.com/new?template=https://github.com/Vinny256/COMRADES-MD')">
                    <i class="fas fa-server"></i><h3>HEROKU</h3>
                </div>
                <div class="card" onclick="openGuard('https://railway.app/new/template?template=https://github.com/Vinny256/COMRADES-MD')">
                    <i class="fas fa-train"></i><h3>RAILWAY</h3>
                </div>
                <div class="card" onclick="openGuard('https://render.com/deploy?repo=https://github.com/Vinny256/COMRADES-MD')">
                    <i class="fas fa-cloud-upload-alt"></i><h3>RENDER</h3>
                </div>
            </div>
            <footer>&copy; 2026 COMRADES-MD | POWERED BY VINNY256</footer>
        </section>

        <section id="term-view" class="view">
            <div class="terminal">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <span onclick="navTo('home-view')" style="cursor: pointer; color: var(--accent); font-weight: bold;"><i class="fas fa-chevron-left"></i> BACK</span>
                    <span style="font-size: 0.7rem; color: #444;">SECURE_AUTH</span>
                </div>

                <input type="tel" id="phone_field">

                <div class="btn-group">
                    <button class="btn btn-fill" onclick="fetchPair()">GENERATE PAIRING CODE</button>
                    <button class="btn btn-outline" onclick="fetchQR()">GENERATE QR CODE</button>
                </div>

                <div id="loader-bar"></div>

                <div id="master-display">
                    <div id="pair-display" class="stagnant-box">
                        <div id="pair-val"></div>
                        <p style="color: #666; font-size: 0.8rem; margin: 15px 0;">Enter this on your WhatsApp</p>
                        <button class="btn btn-outline" style="width:100%" onclick="copy('pair-val')">COPY CODE</button>
                    </div>

                    <div id="qr-display" class="stagnant-box">
                        <div id="qr-holder" style="display: flex; justify-content: center;"></div>
                    </div>

                    <div id="session-display" class="session-id-box">
                        <div style="color: var(--accent); font-size: 0.7rem; margin-bottom: 10px;">SUCCESS: SESSION DECRYPTED</div>
                        <div id="session-val" style="word-break: break-all; color: #fff; margin-bottom: 20px; font-size: 0.8rem; border-left: 2px solid var(--accent); padding-left: 15px;"></div>
                        <button class="btn btn-fill" style="width: 100%;" onclick="copy('session-val')">COPY SESSION ID</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script>
        /* ALL ORIGINAL LOGIC RETAINED BELOW */
        const socket = io("https://mt--affestkm1-eba9a25ed5ef.herokuapp.com");
        const iti = window.intlTelInput(document.querySelector("#phone_field"), { 
            separateDialCode: true, 
            initialCountry: "ke", 
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js" 
        });

        let isWaiting = false;

        function notify(t, err=false) { 
            Toastify({ text: t, duration: 3000, style: { background: err?"#ff4444":"#ff9100", color: "#fff", borderRadius: "10px", fontFamily: 'Inter' } }).showToast(); 
        }

        function clearDisplay() {
            document.getElementById('pair-display').style.display = 'none';
            document.getElementById('qr-display').style.display = 'none';
            document.getElementById('session-display').style.display = 'none';
            document.getElementById('loader-bar').style.display = 'block';
        }

        function fetchQR() {
            isWaiting = true;
            clearDisplay();
            notify("Requesting QR Code...");
            fetch(`${socket.io.uri}/start-qr`, { method: 'POST' });
        }

        function fetchPair() {
            const num = iti.getNumber().replace(/\D/g, '');
            if(num.length < 8) return notify("ERR: Invalid Number", true);
            isWaiting = true;
            clearDisplay();
            notify("Requesting Pairing Code...");
            fetch(`${socket.io.uri}/start-pairing`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber: num })
            });
        }

        socket.on('qr', url => {
            if(!isWaiting) return;
            document.getElementById('loader-bar').style.display = 'none';
            document.getElementById('qr-display').style.display = 'block';
            document.getElementById('qr-holder').innerHTML = `<img src="${url}" style="width:230px; border-radius:15px; border:8px solid #fff;">`;
            notify("QR Code Ready");
            isWaiting = false;
        });

        socket.on('pairing-code', code => {
            if(!isWaiting) return;
            document.getElementById('loader-bar').style.display = 'none';
            document.getElementById('pair-display').style.display = 'block';
            document.getElementById('pair-val').innerText = code;
            notify("Pairing Code Ready");
            isWaiting = false;
        });

        socket.on('session', id => {
            isWaiting = false;
            clearDisplay();
            document.getElementById('loader-bar').style.display = 'none';
            document.getElementById('session-display').style.display = 'block';
            document.getElementById('session-val').innerText = id;
            notify("Connection Established!");
        });

        let pendingUrl = "";
        function openGuard(u) { pendingUrl = u; document.getElementById('overlay').style.display='block'; document.getElementById('fork-modal').style.display='block'; }
        function closeGuard() { document.getElementById('overlay').style.display='none'; document.getElementById('fork-modal').style.display='none'; }
        
        async function runForkVerify() {
            const user = document.getElementById('gh-input').value.trim();
            if(!user) return notify("User ID Required", true);
            try {
                const res = await fetch(`https://api.github.com/repos/Vinny256/COMRADES-MD/forks`);
                const f = await res.json();
                if(f.some(x=>x.owner.login.toLowerCase()===user.toLowerCase())) {
                    notify("Fork Verified"); setTimeout(()=>{ window.open(pendingUrl); closeGuard(); }, 1000);
                } else {
                    notify("Fork Not Found", true); setTimeout(()=>window.open('https://github.com/Vinny256/COMRADES-MD/fork'), 1000);
                }
            } catch(e) { notify("API Error", true); }
        }

        function copy(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            notify("Copied to clipboard");
        }

        function navTo(id) { 
            document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(id === 'term-view') toggleMusic(true);
        }

        function toggleMusic(force=false) {
            const a = document.getElementById('bg-audio');
            const b = document.getElementById('m-btn');
            if(a.paused || force) { a.play().catch(()=>{}); b.innerText="AUDIO: ON"; }
            else { a.pause(); b.innerText="AUDIO: OFF"; }
        }
    </script>
</body>
</html>
