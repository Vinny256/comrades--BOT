<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMRADES-MD | Modern Interface</title>
<link rel="icon" type="image/png" href="https://img.icons8.com/matrix/50/00ff41/matrix-desktop.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
<style>
:root{
  --accent: #ff7a00;
  --bg-dark: #121212;
  --text-light: #fff;
  --glow: rgba(255,122,0,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Share Tech Mono', monospace;background:var(--bg-dark);color:var(--text-light);overflow-x:hidden;transition:0.3s;}
canvas#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}

/* Navbar */
nav{position:sticky;top:0;background:rgba(0,0,0,0.85);display:flex;justify-content:space-between;align-items:center;padding:15px 10%;z-index:10;}
nav .logo{font-family:'Orbitron';font-size:1.8rem;color:var(--accent);letter-spacing:5px;}
nav .links{display:flex;gap:20px;}
nav .links a{text-decoration:none;color:var(--accent);font-weight:bold;transition:0.2s;}
nav .links a:hover{color:#fff;}
nav .theme-toggle{cursor:pointer;padding:5px 10px;border:1px solid var(--accent);border-radius:5px;font-size:0.8rem;}

/* Wrapper */
.wrapper{position:relative;z-index:5;width:100%;padding:50px 10%;}

/* Logo text */
.logo-text{text-align:center;font-family:'Orbitron';color:var(--accent);margin:30px 0;font-size:3rem;letter-spacing:8px;}

/* Grid cards */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin:40px 0;}
.card{border:1px solid rgba(255,122,0,0.2);padding:30px;text-align:center;background: rgba(0,0,0,0.8);transition:0.3s;border-radius:8px;cursor:pointer;}
.card:hover{border-color:var(--accent);box-shadow:0 0 20px var(--glow);transform:translateY(-5px);}
.card i{font-size:2rem;color:var(--accent);margin-bottom:15px;}

/* Output Boxes */
.output-box{background: rgba(0,0,0,0.85);border:1px solid var(--accent);padding:25px;border-radius:10px;margin-bottom:30px;box-shadow:0 0 20px var(--glow);}
.output-box h4{color:var(--accent);margin-bottom:10px;}
.output-box p{word-break:break-all;font-size:0.9rem;color:#fff;}

/* Phone input */
#phone_field{width:100%;padding:15px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:5px;margin-bottom:20px;}

/* Buttons */
.btn{padding:15px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;font-weight:bold;border-radius:5px;margin-top:10px;transition:0.2s;width:100%;}
.btn:hover{background:var(--accent);color:#000;}
.btn-fill{background:var(--accent);color:#000;}

footer{text-align:center;padding:40px 0;opacity:0.6;font-size:0.7rem;letter-spacing:3px;}

@media(max-width:768px){.wrapper{padding:30px 5%;} nav .links{gap:10px;flex-wrap:wrap;}}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<nav>
  <div class="logo">COMRADES-MD</div>
  <div class="links">
    <a href="#" id="home-link"><i class="fas fa-home"></i> Home</a>
    <a href="#" id="deploy-link"><i class="fas fa-terminal"></i> Deploy</a>
    <a href="https://github.com/Vinny256/COMRADES-MD" target="_blank"><i class="fas fa-book"></i> Docs</a>
  </div>
  <div class="theme-toggle" id="theme-toggle">Toggle Theme</div>
</nav>

<div class="wrapper">
  <div class="logo-text">COMRADES-MD</div>
  <p style="text-align:center;color:var(--accent);opacity:0.6;letter-spacing:5px;">V_3.0 NEURAL_INTERFACE</p>

  <!-- Phone input + buttons -->
  <input type="tel" id="phone_field" placeholder="Enter phone number">

  <div class="btn" id="btn-generate-qr">GENERATE QR</div>
  <div class="btn" id="btn-generate-pair">GENERATE PAIR</div>

  <!-- Outputs -->
  <div class="output-box" id="qr-box">
    <h4>QR CODE</h4>
    <div id="qr-holder"></div>
  </div>

  <div class="output-box" id="pair-box">
    <h4>PAIRING CODE</h4>
    <p id="pair-val"></p>
    <div class="btn btn-fill" id="copy-pair">COPY CODE</div>
  </div>

  <div class="output-box" id="session-box">
    <h4>SESSION ID</h4>
    <p id="session-val"></p>
    <div class="btn btn-fill" id="copy-session">COPY SESSION</div>
  </div>

  <div class="grid">
    <div class="card" onclick="window.open('https://github.com/Vinny256/COMRADES-MD')">
      <i class="fas fa-code-branch"></i>
      <h3>SOURCE CODE</h3>
      <p>MAIN_REPOSITORY</p>
    </div>
    <div class="card" onclick="openGuard('https://dashboard.heroku.com/new?template=https://github.com/Vinny256/COMRADES-MD')">
      <i class="fas fa-server"></i>
      <h3>HEROKU</h3>
      <p>DEPLOY_BOT</p>
    </div>
    <div class="card" onclick="openGuard('https://railway.app/new/template?template=https://github.com/Vinny256/COMRADES-MD')">
      <i class="fas fa-train"></i>
      <h3>RAILWAY</h3>
      <p>DEPLOY_BOT</p>
    </div>
    <div class="card" onclick="openGuard('https://render.com/deploy?repo=https://github.com/Vinny256/COMRADES-MD')">
      <i class="fas fa-cloud-upload-alt"></i>
      <h3>RENDER</h3>
      <p>DEPLOY_BOT</p>
    </div>
  </div>

  <footer>&copy; 2026 COMRADES-MD | POWERED BY VINNY256</footer>
</div>

<!-- JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script>
const socket = io("https://mt--affestkm1-eba9a25ed5ef.herokuapp.com");
const iti = intlTelInput(document.querySelector("#phone_field"), { separateDialCode:true, initialCountry:"ke", utilsScript:"https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"});

// Notifications
function notify(msg, err=false){
  Toastify({text:msg,duration:3000,style:{background:err?"#900":"#222",color:err?"#f00":"var(--accent)",border:`1px solid ${err?"#f00":"var(--accent)"}`,fontFamily:'Share Tech Mono'}}).showToast();
}

// Starry background
const canvas=document.getElementById('stars');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let stars=[]; for(let i=0;i<200;i++){stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-0.5)*0.2,dy:(Math.random()-0.5)*0.2});}
function drawStars(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fill();s.x+=s.dx;s.y+=s.dy;if(s.x>canvas.width)s.x=0;if(s.x<0)s.x=canvas.width;if(s.y>canvas.height)s.y=0;if(s.y<0)s.y=canvas.height;}requestAnimationFrame(drawStars);}
drawStars();

// Output boxes
const qrBox=document.getElementById('qr-box');
const pairBox=document.getElementById('pair-box');
const sessionBox=document.getElementById('session-box');

// Buttons
document.getElementById('btn-generate-qr').onclick=()=>{
  notify("REQUESTING QR...");
  fetch(`${socket.io.uri}/start-qr`,{method:'POST'});
};
document.getElementById('btn-generate-pair').onclick=()=>{
  const num=iti.getNumber().replace(/\D/g,'');
  if(num.length<8){notify("INVALID NUMBER",true); return;}
  notify("REQUESTING PAIR...");
  fetch(`${socket.io.uri}/start-pairing`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phoneNumber:num})});
};

// Socket events
socket.on('qr',url=>{qrBox.innerHTML='<h4>QR CODE</h4><img src="'+url+'" style="width:200px;border:5px solid #fff;background:#fff;">';notify("QR RECEIVED");});
socket.on('pairing-code',code=>{pairBox.querySelector('p').innerText=code;notify("PAIR RECEIVED");});
socket.on('session',id=>{sessionBox.querySelector('p').innerText=id;notify("SESSION ESTABLISHED");});

// Clipboard
document.getElementById('copy-pair').onclick=()=>{navigator.clipboard.writeText(pairBox.querySelector('p').innerText);notify("COPIED");};
document.getElementById('copy-session').onclick=()=>{navigator.clipboard.writeText(sessionBox.querySelector('p').innerText);notify("COPIED");};

// Fork Guard
let pendingUrl="";
function openGuard(url){pendingUrl=url;alert("Guard opened for "+url);}
</script>
</body>
</html>
